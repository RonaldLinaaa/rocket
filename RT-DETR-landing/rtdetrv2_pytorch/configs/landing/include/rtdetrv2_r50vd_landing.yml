task: detection

# ===== Model =====
model: RTDETR
criterion: LandingKeypointCriterion
postprocessor: LandingPostProcessor

use_focal_loss: True
eval_spatial_size: [640, 640]

num_classes: 1

# ----- Backbone: ResNet50-vd -----
RTDETR:
  backbone: PResNet
  encoder: HybridEncoder
  decoder: RTDETRTransformerLanding

PResNet:
  depth: 50
  variant: d
  freeze_at: 0
  return_idx: [1, 2, 3]
  num_stages: 4
  freeze_norm: True
  pretrained: False

# ----- Hybrid Encoder -----
HybridEncoder:
  in_channels: [512, 1024, 2048]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.
  enc_act: 'gelu'
  expansion: 1.0
  depth_mult: 1
  act: 'silu'

# ----- Landing Decoder: RTDETRv2 + keypoint heads -----
RTDETRTransformerLanding:
  num_keypoints: 9
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  num_levels: 3
  num_layers: 6
  num_queries: 300
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  eval_idx: -1
  num_points: [4, 4, 4]
  cross_attn_method: default
  query_select_method: default

# ----- PostProcessor -----
LandingPostProcessor:
  num_top_queries: 300
  num_keypoints: 9

# ----- Loss Function -----
# L = L_vfl + L_bbox + L_giou + L_kpt + L_oks + L_vis + L_struct
LandingKeypointCriterion:
  num_keypoints: 9
  weight_dict: {
    loss_vfl: 1,
    loss_bbox: 5,
    loss_giou: 2,
    loss_keypoints: 10,
    loss_oks: 4,
    loss_vis: 1,
    loss_struct: 2,
  }
  losses: ['vfl', 'boxes', 'keypoints', 'oks', 'vis', 'struct']
  alpha: 0.75
  gamma: 2.0

  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
