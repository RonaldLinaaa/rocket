task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox']

num_classes: 1
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: LandingKeypointDataset
    img_folder: ../../datasets/
    ann_file: ../../datasets/annotations_coco_keypoints.json
    num_keypoints: 9
    split: train
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction

val_dataloader:
  type: DataLoader
  dataset:
    type: LandingKeypointDataset
    img_folder: ../../datasets/
    ann_file: ../../datasets/annotations_coco_keypoints.json
    num_keypoints: 9
    split: val
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
